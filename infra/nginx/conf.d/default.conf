# Drop requests with no matching server_name — prevents host-header injection.
# /healthz is served before the catch-all drop for Docker healthchecks.
server {
    listen 80 default_server;
    server_name _;

    location /healthz {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 444;
    }
}
