services:
  infisical:
    image: infisical/infisical:latest-postgres
    container_name: infisical
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Encryption — must be exactly 16 or 32 hex chars
      ENCRYPTION_KEY: ${INFISICAL_ENCRYPTION_KEY}
      # JWT signing secret — min 32 chars
      AUTH_SECRET: ${INFISICAL_AUTH_SECRET}
      # Database
      DB_CONNECTION_URI: postgresql://${INFISICAL_DB_USER}:${INFISICAL_DB_PASSWORD}@postgres-auth:5432/infisical_db
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis-auth:6379
      # Public URL
      SITE_URL: https://${INFISICAL_HOSTNAME}
      # SMTP (internal relay — no auth needed, only auth-network access)
      SMTP_HOST: smtp-relay
      SMTP_PORT: "25"
      SMTP_FROM_ADDRESS: ${SMTP_FROM}
      SMTP_FROM_NAME: Identity Platform
      # TLS terminated at Nginx
      HTTPS_ENABLED: "false"
    networks:
      - auth-network
      - db-auth-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    security_opt:
      - no-new-privileges:true

networks:
  auth-network:
    external: true
  db-auth-network:
    external: true
