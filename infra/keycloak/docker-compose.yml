services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    restart: unless-stopped
    command: start
    environment:
      # Database
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-auth:5432/keycloak_db
      KC_DB_USERNAME: ${KC_DB_USER}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      # Hostname — TLS terminated at Nginx/Cloudflare
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME}
      KC_HOSTNAME_STRICT: "true"
      KC_HOSTNAME_STRICT_HTTPS: "true"
      KC_HTTP_ENABLED: "true"
      KC_HTTPS_ENABLED: "false"
      KC_PROXY: edge
      KC_HTTP_PORT: 8080
      # Admin credentials (used only on first boot to create the admin user)
      KEYCLOAK_ADMIN: ${KC_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      # Performance
      KC_CACHE: local
      KC_DB_POOL_MAX_SIZE: "20"
      # Logging
      KC_LOG_LEVEL: INFO
      KC_LOG_CONSOLE_COLOR: "false"
    volumes:
      - keycloak-data:/opt/keycloak/data
    networks:
      - auth-network
      - db-auth-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s
    security_opt:
      - no-new-privileges:true

volumes:
  keycloak-data:
    name: keycloak-data

networks:
  auth-network:
    external: true
  db-auth-network:
    external: true
